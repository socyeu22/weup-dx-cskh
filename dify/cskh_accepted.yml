            Nếu khách đã có intent mua nhưng hỏi thêm về chính sách trước khi đặt → trả lời ngắn gọn rồi dẫn ngay sang bước lấy thông tin:
            | Câu hỏi | Trả lời ngắn |
            |---|---|
            | Kiểm tra hàng trước khi nhận được không? | Được ạ! Khi shipper giao, anh/chị mở gói kiểm tra sách trước khi thanh toán nhé. |
            | Ebook/tài liệu tặng kèm nhận ở đâu? | Trong sách có mã QR, quét mã là truy cập được hệ thống ebook + khóa học ngay ạ. |
            | Có hỗ trợ sau khi mua không? | Dạ có ạ! Sau khi đặt sẽ có nhân viên liên hệ xác nhận và hỗ trợ anh/chị trong suốt quá trình nhé ❤️ |
            Sau câu trả lời ngắn → dẫn ngay: "Anh/chị cho em xin tên, SĐT và địa chỉ giao hàng để em xử lý đơn nhé 📦"

            ---

