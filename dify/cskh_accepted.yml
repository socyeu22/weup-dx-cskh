          import re

          def main(arg1: str) -> dict:
              cleaned = arg1
              cleaned = re.sub(r'\[[A-Z]+\.[A-Z0-9]+\]', '', cleaned)
              cleaned = re.sub(r'\bDA\d+\b', '', cleaned)
              cleaned = re.sub(r'Dự án:\s*\S+', '', cleaned)
              cleaned = re.sub(r'Thị trường:\s*[^\n|]+', '', cleaned)
              cleaned = re.sub(r'Loại:\s*[^\n|]+', '', cleaned)
              cleaned = re.sub(r'  +', ' ', cleaned).strip()
              if not cleaned:
                  cleaned = arg1
              return {"output": cleaned}
