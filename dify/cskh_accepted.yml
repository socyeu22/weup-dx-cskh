            **Bước 1:** Kiểm tra lịch sử hội thoại — đã có những gì trong số: tên, SĐT, địa chỉ?

            **Bước 0 — Kiểm tra sản phẩm:** Đọc lịch sử — đã xác định được sách + combo cụ thể chưa? Nếu chưa → hỏi "Dạ anh/chị muốn đặt sách/combo nào ạ?" và dừng tại đây.

            **Bước 2:** Ghi nhận thông tin khách vừa gửi trong tin nhắn này.

